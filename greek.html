<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Greek</title>
    <!-- Mobile App Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <style>
        :root {
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            color: #111;
            max-width: 70ch;
            margin: 0 auto;
            padding: 1rem;
        }

        *+* {
            margin-top: 1.5em;
        }

        h1,
        h2,
        h3 {
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.5em;
        }

        h2 {
            margin-top: 3em;
            border-top: 1px solid #eee;
            padding-top: 1em;
            font-size: 1.25em;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 0.05em;
        }

        a {
            color: inherit;
            text-decoration: none;
            border-bottom: 2px solid #ccc;
            transition: 0.2s;
        }

        a:hover {
            border-bottom-color: #000;
        }

        header.root-nav {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #000;
        }

        /* Recuperando las Clases del Currículo */
        .curriculum-link {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #eee;
            transition: all 0.2s ease;
        }

        .curriculum-link:hover {
            background: #f4f4f4;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        /* Clases para Lecciones */
        .lesson-container {
            margin-top: 2rem;
        }

        .greek-text {
            font-family: 'Times New Roman', serif;
            font-size: 1.4em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 2em;
        }

        th,
        td {
            text-align: left;
            padding: 0.75em;
            border-bottom: 1px solid #eee;
        }

        th {
            color: #888;
            text-transform: uppercase;
            font-size: 0.8em;
            background: #fafafa;
        }

        .lesson-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6rem;
            padding: 2.5rem 0;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            gap: 1rem;
        }

        .lesson-nav>* {
            flex: 1;
            margin-top: 0 !important;
            /* Desactivar el Lobotomized Owl */
            border: none !important;
            line-height: 1.2;
            display: block;
        }

        .lesson-nav a:first-child {
            text-align: left;
        }

        .lesson-nav a:nth-child(2) {
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #000;
        }

        .lesson-nav a:last-child {
            text-align: right;
        }

        .lesson-nav span {
            opacity: 0;
            pointer-events: none;
        }

        .lesson-nav a:hover {
            color: var(--accent, #0051ff);
            background: transparent;
            /* Asegurar que no hay fondo del hover anterior */
        }

        /* Estilos para componentes interactivos */
        .flash-card {
            background: #f4f4f4;
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
            margin-top: 1rem;
        }

        .flash-card:hover {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Lesson Header Alignment */
        .lesson-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .lesson-meta {
            margin: 0;
            font-size: 1.5rem;
            color: #888;
            font-weight: 400;
        }

        /* Add a visual separator */
        .lesson-meta::after {
            content: " —";
            margin-left: 0.2rem;
        }

        .lesson-header h1 {
            margin: 0;
            line-height: 1;
            font-size: 2.2rem;
        }

        /* --- Content Modules System --- */

        /* Grids */
        .case-grid,
        .phrase-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            margin-top: 2rem;
        }

        /* Cards */
        .phrase-card,
        .tense-card {
            border: 1px solid #eee;
            padding: 1.5rem;
            border-radius: 8px;
            background: #fafafa;
        }

        .phrase-card h3,
        .tense-card h3 {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        /* Lists */
        .phrase-list,
        .rule-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .phrase-list li,
        .rule-list li {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #eee;
        }

        .phrase-list li:last-child,
        .rule-list li:last-child {
            border-bottom: none;
        }

        /* Typography utils */
        .greek {
            font-family: 'Times New Roman', serif;
            font-size: 1.15em;
            font-weight: 500;
        }

        .meaning {
            color: #666;
            font-size: 0.95em;
        }

        /* Info Box */
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #0051ff;
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
        }

        .info-box h3 {
            margin-top: 0;
            color: #0051ff;
            font-size: 1rem;
        }

        /* Structured Content Modules */
        .section-intro {
            font-size: 1.2rem;
            color: #444;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .module-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px dashed #eee;
        }

        .grammar-info {
            background: #fff8e1;
            /* Subtle yellow for grammar highlight */
            border-left: 4px solid #fbc02d;
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
        }

        .grammar-info h2,
        .grammar-info h3 {
            margin-top: 0;
            color: #f57f17;
            border-bottom: none;
            font-size: 1.1em;
        }
    </style>
</head>

<body>
    <header class="root-nav">
        <a href="#/" style="font-weight: 800; border:none;">GREEK ZERO</a>
        <a href="#/curriculum" style="border:none;">INDEX</a>
    </header>
    <main id="app"></main>
    <footer
        style="margin-top: 6rem; text-align: center; color: #999; font-size: 0.8em; border-top: 1px solid #eee; padding-top: 2rem;">
        &copy; 2026 / MODERN GREEK PROJECT
    </footer>
    <script>
        const app = document.getElementById('app');

        // El Atractor Recursivo (Zen + Interactive)
        const render = (node) => {
            if (!Array.isArray(node)) return document.createTextNode(node);
            const [tag, props, ...children] = node;
            const el = document.createElement(tag);

            if (props) Object.entries(props).forEach(([k, v]) => {
                const key = k === 'class' ? 'className' : k;
                // Soporte para eventos definidos como strings (IA-Ready)
                if (key.startsWith('on') && typeof v === 'string') {
                    el[key] = new Function(v);
                } else {
                    el[key] = v;
                }
            });

            children.map(render).forEach(child => el.appendChild(child));
            return el;
        };

        // El Navegador de Estados
        fetch('data.json').then(r => r.json()).then(db => {
            const route = () => {
                const state = window.location.hash.slice(1) || '/';
                app.replaceChildren(render(db[state] || db['404']));
                window.scrollTo(0, 0);
            };
            window.onhashchange = route;
            route();
        });

        // Register Service Worker for Offline access (PWA Core)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
