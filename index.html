<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek</title>
    <!-- Mobile App Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <!-- Fonts: Lora (Editorial), Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --muted-text: #757575;
            --border: #111111;
            --secondary-bg: #f8f8f8;
            --card-bg: #ffffff;
            --accent: #111111;

            --font-ui: 'Inter', system-ui, sans-serif;
            --font-editorial: 'Lora', serif;
        }

        html.dark-mode {
            --bg: #111111;
            --text: #f4f4f4;
            --muted-text: #a0a0a0;
            --border: #f4f4f4;
            --secondary-bg: #1a1a1a;
            --card-bg: #111111;
            --accent: #f4f4f4;
        }

        html.sepia-mode {
            --bg: #f4ecd8;
            --text: #433422;
            --muted-text: #8b7355;
            --border: #dccdba;
            --secondary-bg: #eaddc5;
            --card-bg: #fdf6e3;
            --accent: #5c4033;
        }

        body {
            color: var(--text);
            background: var(--bg);
            max-width: 65ch;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            font-family: var(--font-editorial);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Fade-in for content transitions */
        #app {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body.dark-mode img {
            filter: invert(1) brightness(1.2) contrast(1.2);
        }

        body.sepia-mode img {
            filter: sepia(0.4) contrast(0.9) brightness(0.9);
        }

        *+* {
            margin-top: 1.25rem;
        }

        header *,
        footer *,
        .lesson-nav * {
            margin-top: 0;
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-ui);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        h2 {
            margin-top: 2rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--muted-text);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        /* First section title should not have a top border */
        h2:first-child,
        #app>h2:first-of-type,
        .curriculum-container section:first-child h2 {
            border-top: none !important;
            margin-top: 0 !important;
            padding-top: 0 !important;
        }

        h3 {
            font-size: 1.4rem;
            letter-spacing: -0.01em;
        }

        a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        a:hover {
            opacity: 0.6;
            border-bottom-width: 2px;
        }

        header.root-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: var(--font-ui);
        }

        .lang-toggle,
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .lang-toggle:hover,
        .theme-toggle:hover {
            background: var(--text);
            color: var(--bg);
        }

        .lang-toggle svg,
        .theme-toggle svg {
            width: 1rem;
            height: 1rem;
            fill: currentColor;
            margin-right: 0.4rem;
        }

        /* --- Curriculum --- */
        .curriculum-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            margin-bottom: 0.4rem;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .curriculum-link:hover {
            background: var(--text);
            color: var(--bg);
            transform: translateX(4px);
        }

        /* --- Lessons --- */
        .lesson-container {
            margin-top: 3rem;
        }

        .lesson-header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .lesson-meta {
            font-family: var(--font-ui);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--muted-text);
            margin-bottom: 0.5rem;
            display: block;
        }

        .lesson-header h1 {
            font-family: var(--font-editorial);
            font-weight: 400;
            font-size: 3.5rem;
            letter-spacing: -0.02em;
        }

        /* Table Design */
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 3rem 0;
            font-size: 0.95rem;
        }

        th {
            font-family: var(--font-ui);
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted-text);
            font-size: 0.8rem;
        }

        td {
            font-family: var(--font-editorial);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Content Blocks */
        .content-card {
            border: 1px solid var(--border);
            padding: 2rem;
            margin-top: 2rem;
            background: var(--card-bg);
        }

        .content-card h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .content-grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .example-box {
            border-left: 1px solid var(--border);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--muted-text);
        }

        .info-box,
        .grammar-info {
            background: var(--secondary-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            margin: 3rem 0;
        }

        .info-box h3,
        .grammar-info h3 {
            margin-top: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Typography Utilities */
        .greek {
            font-size: 1.2em;
            font-weight: 400;
            color: var(--text);
        }

        .spanish {
            font-weight: 800;
            font-family: var(--font-ui);
        }

        .meaning {
            font-style: italic;
            color: var(--muted-text);
        }

        /* Navigation Buttons */
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem !important;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
            font-family: var(--font-ui);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .lesson-nav a {
            border: 1px solid var(--border);
            padding: 0.8rem 1.2rem;
            transition: 0.3s;
        }

        .lesson-nav a:hover {
            background: var(--text);
            color: var(--bg);
            opacity: 1;
        }

        .lesson-nav a.menu-btn {
            border: none;
            font-weight: 800;
        }

        .lesson-nav span {
            visibility: hidden;
        }

        /* Utils */
        .mt-12 {
            margin-top: 3rem;
        }

        .mb-12 {
            margin-bottom: 3rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        /* Structural Header & Footer */
        header.root-nav a.logo {
            font-weight: 800;
            border: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: var(--font-ui);
            letter-spacing: -0.05em;
        }

        header.root-nav .owl-logo {
            height: 1.8rem;
            width: auto;
            fill: var(--text);
            transition: fill 0.3s ease;
        }

        footer {
            margin-top: 1rem !important;
            text-align: center;
            color: var(--muted-text);
            font-size: 0.6rem;
            border-top: 1px solid var(--border);
            padding: 1rem 0;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-family: var(--font-ui);
        }
    </style>
</head>

<body>
    <header class="root-nav">
        <a href="#/" class="logo">
            <svg class="owl-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <rect width="512" height="512" fill="none" rx="64" ry="64" stroke="currentColor" stroke-width="20" />
                <text id="logo-symbol" x="50%" y="62%" dominant-baseline="middle" text-anchor="middle"
                    font-family="var(--font-editorial)" font-weight="bold" font-size="320">Ω</text>
            </svg>
            <span id="logo-text">GREEK</span>
        </a>
        <div class="header-actions">
            <button id="lang-toggle" class="lang-toggle" title="Change Language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                <span id="lang-label" style="text-transform: uppercase;">EN</span>
            </button>
            <button id="theme-toggle" class="theme-toggle" title="Change Theme">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Icon updated by Javascript -->
                </svg>
            </button>
        </div>
    </header>
    <main id="app"></main>
    <footer id="footer"></footer>
    <script>
        const app = document.getElementById('app');
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');
        const langLabel = document.getElementById('lang-label');
        const footer = document.getElementById('footer');
        const logoText = document.getElementById('logo-text');
        const logoSymbol = document.getElementById('logo-symbol');

        // i18n Configuration
        const I18N = {
            el: {
                label: 'EL',
                symbol: 'Ω',
                title: 'GREEK',
                themeToggle: 'Change Theme',
                langToggle: 'Change Language',
                footer: '&copy; 2026 / GREEK PROJECT',
                dataFile: 'public/data/el/curriculum.json',
                lessonsPath: 'public/data/el/lessons/'
            },
            es: {
                label: 'ES',
                symbol: 'Ñ',
                title: 'SPANISH',
                themeToggle: 'Change Theme',
                langToggle: 'Change Language',
                footer: '&copy; 2026 / SPANISH PROJECT',
                dataFile: 'public/data/es/curriculum.json',
                lessonsPath: 'public/data/es/lessons/'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'el';
        let db = null;
        let lessonCache = {};

        const updateUIStrings = () => {
            const strings = I18N[currentLang];
            langLabel.textContent = strings.label;
            themeToggle.title = strings.themeToggle;
            langToggle.title = strings.langToggle;
            footer.innerHTML = strings.footer;
            document.title = strings.title;
            logoText.textContent = strings.title;
            logoSymbol.textContent = strings.symbol;
        };

        // Theme Management
        const themes = ['light', 'dark', 'sepia'];
        let currentTheme = localStorage.getItem('theme');
        if (!currentTheme) {
            currentTheme = localStorage.getItem('dark-mode') === 'true' ? 'dark' : 'light';
        }

        const themeIcons = {
            light: '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>', // Sun
            dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>', // Moon
            sepia: '<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>' // Book
        };

        const applyTheme = (theme) => {
            document.documentElement.classList.remove('dark-mode', 'sepia-mode');
            if (theme !== 'light') {
                document.documentElement.classList.add(`${theme}-mode`);
            }
            document.getElementById('theme-icon').innerHTML = themeIcons[theme];
        };

        applyTheme(currentTheme);

        themeToggle.addEventListener('click', () => {
            const nextThemeIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
            currentTheme = themes[nextThemeIndex];
            localStorage.setItem('theme', currentTheme);
            localStorage.setItem('dark-mode', currentTheme === 'dark'); // fallback for backwards compatibility
            applyTheme(currentTheme);
        });

        // Language Management
        const switchLanguage = async (lang) => {
            currentLang = lang;
            lessonCache = {}; // Clear cache on language switch
            localStorage.setItem('lang', lang);
            updateUIStrings();
            await loadData();

            // Return to home menu to avoid 404s (lessons are not shared between langs)
            window.location.hash = '#/';
            route();
        };

        langToggle.addEventListener('click', () => {
            const nextLang = currentLang === 'el' ? 'es' : 'el';
            switchLanguage(nextLang);
        });

        // Extractor de Lecciones para Navegación
        const getFlatLessons = () => {
            if (!db || !db.structure) return [];
            const flat = [];
            for (const section in db.structure) {
                flat.push(...db.structure[section]);
            }
            return flat;
        };

        const createNavBlockHTML = (currentId) => {
            const lessons = getFlatLessons();
            const currentIndex = lessons.findIndex(l => l.id === currentId);

            if (currentIndex === -1) return '';

            let prevLink = '<span></span>';
            if (currentIndex > 0) {
                const prev = lessons[currentIndex - 1];
                prevLink = `<a href="#/lessons/${prev.id}">← ${prev.title}</a>`;
            }

            let nextLink = '<span></span>';
            if (currentIndex < lessons.length - 1) {
                const next = lessons[currentIndex + 1];
                nextLink = `<a href="#/lessons/${next.id}">${next.title} →</a>`;
            }

            return `
            <div class="lesson-nav">
                ${prevLink}
                <a href="#/" class="menu-btn">MENU</a>
                ${nextLink}
            </div>`;
        };

        // El Navegador de Estados
        const loadData = async () => {
            const r = await fetch(`${I18N[currentLang].dataFile}?v=${Date.now()}`);
            db = await r.json();
        };

        const fetchLessonHTML = async (id) => {
            if (lessonCache[id]) return lessonCache[id];
            try {
                const r = await fetch(`${I18N[currentLang].lessonsPath}${id}.html`);
                if (!r.ok) throw new Error('Not found');
                const html = await r.text();
                lessonCache[id] = html;
                return html;
            } catch (e) {
                return null;
            }
        };

        const route = async () => {
            if (!db) return;
            const hash = window.location.hash.slice(1) || '/';

            app.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--muted-text);">Loading...</div>';

            if (hash === '/' || hash === '/curriculum') {
                app.innerHTML = db.home; // db.home is now raw HTML
            } else if (hash.startsWith('/lessons/')) {
                const id = hash.replace('/lessons/', '');
                const lessonHTML = await fetchLessonHTML(id);

                if (lessonHTML) {
                    // Find metadata for orientation
                    let chapterName = '';
                    let lessonNum = '';
                    for (const section in db.structure) {
                        const lesson = db.structure[section].find(l => l.id === id);
                        if (lesson) {
                            chapterName = section;
                            lessonNum = lesson.num;
                            break;
                        }
                    }

                    const metaHTML = chapterName ? `
                        <div class="lesson-meta">
                            ${chapterName} ${lessonNum ? `&middot; LESSON ${lessonNum}` : ''}
                        </div>
                    ` : '';

                    const navHTML = createNavBlockHTML(id);
                    app.innerHTML = metaHTML + lessonHTML + navHTML;
                } else {
                    app.innerHTML = `
                    <div style="padding: 5rem; text-align: center">
                        <h1 style="color: #e53e3e">404: Lesson HTML not found</h1>
                        <a href="#/">Back to Curriculum</a>
                    </div>`;
                }
            } else {
                app.innerHTML = `
                <div style="padding: 5rem; text-align: center">
                    <h1 style="color: #e53e3e">404: Node not found</h1>
                    <a href="#/">Back to Curriculum</a>
                </div>`;
            }
            window.scrollTo(0, 0);
        };

        window.onhashchange = route;

        // Keyboard Navigation
        window.addEventListener('keydown', (e) => {
            const hash = window.location.hash.slice(1);
            if (!hash.startsWith('/lessons/')) return;

            const currentId = hash.replace('/lessons/', '');
            const lessons = getFlatLessons();
            const currentIndex = lessons.findIndex(l => l.id === currentId);

            if (currentIndex === -1) return;

            if (e.key === 'ArrowRight' && currentIndex < lessons.length - 1) {
                window.location.hash = `#/lessons/${lessons[currentIndex + 1].id}`;
            } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                window.location.hash = `#/lessons/${lessons[currentIndex - 1].id}`;
            }
        });

        // Initialize
        updateUIStrings();
        loadData().then(route);

        // Register Service Worker for Offline access (PWA Core)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
