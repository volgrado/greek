<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek</title>
    <!-- Mobile App Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --muted-text: #666666;
            --border: #eeeeee;
            --accent: #0051ff;
            --secondary-bg: #f4f4f4;
            --card-bg: #fafafa;
            --info-bg: #f0f7ff;
            --grammar-bg: #fff8e1;
            --grammar-border: #fbc02d;
            --grammar-text: #f57f17;

            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
        }

        html.dark-mode,
        body.dark-mode {
            --bg: #111111;
            --text: #eeeeee;
            --muted-text: #aaaaaa;
            --border: #333333;
            --accent: #4d8aff;
            --secondary-bg: #1a1a1a;
            --card-bg: #161616;
            --info-bg: #0a192f;
            --grammar-bg: #2d2a1e;
            --grammar-border: #fbc02d;
            --grammar-text: #ffe082;
        }

        body {
            color: var(--text);
            background: var(--bg);
            max-width: 70ch;
            margin: 0 auto;
            padding: 1rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Invert logo in dark mode if needed, but it's an SVG owl, maybe filter is better */
        body.dark-mode img {
            filter: invert(1) brightness(2);
        }

        *+* {
            margin-top: 1.5em;
        }

        /* Reset for header elements to avoid top margin */
        header *,
        footer *,
        .lesson-nav * {
            margin-top: 0;
        }

        h1,
        h2,
        h3 {
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.5em;
        }

        h2 {
            margin-top: 3em;
            border-top: 1px solid var(--border);
            padding-top: 1em;
            font-size: 1.25em;
            text-transform: uppercase;
            color: var(--muted-text);
            letter-spacing: 0.05em;
        }

        a {
            color: inherit;
            text-decoration: none;
            border-bottom: 2px solid #ccc;
            transition: 0.2s;
        }

        body.dark-mode a {
            border-bottom-color: #444;
        }

        a:hover {
            border-bottom-color: var(--text);
        }

        header.root-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid var(--text);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lang-toggle,
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .lang-toggle:hover,
        .theme-toggle:hover {
            background: var(--secondary-bg);
        }

        .lang-toggle svg,
        .theme-toggle svg {
            width: 1.25rem;
            height: 1.25rem;
            fill: currentColor;
        }

        /* Recuperando las Clases del Currículo */
        .curriculum-link {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .curriculum-link:hover {
            background: var(--secondary-bg);
            padding-left: 1rem;
            padding-right: 1rem;
        }

        /* Clases para Lecciones */
        .lesson-container {
            margin-top: 2rem;
        }

        .greek-text {
            font-family: 'Times New Roman', serif;
            font-size: 1.4em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 2em;
        }

        th,
        td {
            text-align: left;
            padding: 0.75em;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--muted-text);
            text-transform: uppercase;
            font-size: 0.8em;
            background: var(--card-bg);
        }

        .lesson-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6rem;
            padding: 2.5rem 0;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            gap: 1rem;
        }

        .lesson-nav>* {
            flex: 1;
            margin-top: 0 !important;
            border: none !important;
            line-height: 1.2;
            display: block;
        }

        .lesson-nav a:first-child {
            text-align: left;
        }

        .lesson-nav a:nth-child(2) {
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text);
        }

        .lesson-nav a:last-child {
            text-align: right;
        }

        .lesson-nav span {
            opacity: 0;
            pointer-events: none;
        }

        .lesson-nav a:hover {
            color: var(--accent);
            background: transparent;
        }

        /* Estilos para componentes interactivos */
        .flash-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
            margin-top: 1rem;
        }

        .flash-card:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* Lesson Header Alignment */
        .lesson-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .lesson-meta {
            margin: 0;
            font-size: 1.5rem;
            color: var(--muted-text);
            font-weight: 400;
        }

        /* Add a visual separator */
        .lesson-meta::after {
            content: " —";
            margin-left: 0.2rem;
        }

        .lesson-header h1 {
            margin: 0;
            line-height: 1;
            font-size: 2.2rem;
        }

        /* --- Content Modules System --- */

        /* Grids */
        .content-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            margin-top: 2rem;
        }

        /* Cards */
        .content-card {
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            background: var(--card-bg);
        }

        .content-card h3 {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        /* Lists */
        .content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .content-list li {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed var(--border);
        }

        .content-list li:last-child {
            border-bottom: none;
        }

        /* Typography utils */
        .greek {
            font-family: 'Times New Roman', serif;
            font-size: 1.15em;
            font-weight: 500;
        }

        .meaning {
            color: var(--muted-text);
            font-size: 0.95em;
        }

        /* Info Box */
        .info-box {
            background: var(--info-bg);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
        }

        .info-box h3 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1rem;
        }

        /* Structured Content Modules */
        .section-intro {
            font-size: 1.2rem;
            color: var(--text);
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .module-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px dashed var(--border);
        }

        .grammar-info {
            background: var(--grammar-bg);
            border-left: 4px solid var(--grammar-border);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
        }

        .grammar-info h2,
        .grammar-info h3 {
            margin-top: 0;
            color: var(--grammar-text);
            border-bottom: none;
            font-size: 1.1em;
        }

        /* Example Box (Case Studies) for Dark Mode Compatibility */
        .example-box {
            background: var(--secondary-bg);
            border-left: 3px solid var(--muted-text);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .translation {
            color: var(--muted-text);
            font-style: italic;
        }
    </style>
</head>

<body>
    <header class="root-nav">
        <a href="#/" style="font-weight: 800; border:none; display: flex; align-items: center; gap: 0.8rem;">
            <img src="assets/icon.svg" alt="logo" style="height: 1.5rem; width: auto;">
            <span id="logo-text">GREEK</span>
        </a>
        <div class="header-actions">
            <button id="lang-toggle" class="lang-toggle" title="Change Language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                <span id="lang-label" style="margin-left: 0.3rem; text-transform: uppercase;">EN</span>
            </button>
            <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
                </svg>
            </button>
        </div>
    </header>
    <main id="app"></main>
    <footer id="footer"
        style="margin-top: 6rem; text-align: center; color: var(--muted-text); font-size: 0.8em; border-top: 1px solid var(--border); padding-top: 2rem;">
        &copy; 2026 / MODERN GREEK PROJECT
    </footer>
    <script>
        const app = document.getElementById('app');
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');
        const langLabel = document.getElementById('lang-label');
        const footer = document.getElementById('footer');
        const logoText = document.getElementById('logo-text');

        // i18n Configuration
        const I18N = {
            el: {
                label: 'EL',
                title: 'GREEK',
                themeToggle: 'Toggle Dark Mode',
                langToggle: 'Change Language',
                footer: '&copy; 2026 / MODERN GREEK PROJECT',
                dataFile: 'public/data/el/curriculum.json',
                lessonsPath: 'public/data/el/lessons/'
            },
            es: {
                label: 'ES',
                title: 'SPANISH',
                themeToggle: 'Toggle Dark Mode',
                langToggle: 'Change Language',
                footer: '&copy; 2026 / MODERN SPANISH PROJECT',
                dataFile: 'public/data/es/curriculum.json',
                lessonsPath: 'public/data/es/lessons/'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'el';
        let db = null;
        let lessonCache = {};

        const updateUIStrings = () => {
            const strings = I18N[currentLang];
            langLabel.textContent = strings.label;
            themeToggle.title = strings.themeToggle;
            langToggle.title = strings.langToggle;
            footer.innerHTML = strings.footer;
            document.title = strings.title;
            logoText.textContent = strings.title;
        };

        // Theme Management
        if (localStorage.getItem('dark-mode') === 'true') {
            document.documentElement.classList.add('dark-mode');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', isDark);
        });

        // Language Management
        const switchLanguage = async (lang) => {
            currentLang = lang;
            lessonCache = {}; // Clear cache on language switch
            localStorage.setItem('lang', lang);
            updateUIStrings();
            await loadData();
            route();
        };

        langToggle.addEventListener('click', () => {
            const nextLang = currentLang === 'el' ? 'es' : 'el';
            switchLanguage(nextLang);
        });

        // Extractor de Lecciones para Navegación
        const getFlatLessons = () => {
            if (!db || !db.structure) return [];
            const flat = [];
            for (const section in db.structure) {
                flat.push(...db.structure[section]);
            }
            return flat;
        };

        const createNavBlockHTML = (currentId) => {
            const lessons = getFlatLessons();
            const currentIndex = lessons.findIndex(l => l.id === currentId);

            if (currentIndex === -1) return '';

            let prevLink = '<span></span>';
            if (currentIndex > 0) {
                const prev = lessons[currentIndex - 1];
                prevLink = `<a href="#/lessons/${prev.id}">← ${prev.title}</a>`;
            }

            let nextLink = '<span></span>';
            if (currentIndex < lessons.length - 1) {
                const next = lessons[currentIndex + 1];
                nextLink = `<a href="#/lessons/${next.id}">${next.title} →</a>`;
            }

            return `
            <div class="lesson-nav">
                ${prevLink}
                <a href="#/" class="menu-btn">MENU</a>
                ${nextLink}
            </div>`;
        };

        // El Navegador de Estados
        const loadData = async () => {
            const r = await fetch(`${I18N[currentLang].dataFile}?v=${Date.now()}`);
            db = await r.json();
        };

        const fetchLessonHTML = async (id) => {
            if (lessonCache[id]) return lessonCache[id];
            try {
                const r = await fetch(`${I18N[currentLang].lessonsPath}${id}.html`);
                if (!r.ok) throw new Error('Not found');
                const html = await r.text();
                lessonCache[id] = html;
                return html;
            } catch (e) {
                return null;
            }
        };

        const route = async () => {
            if (!db) return;
            const hash = window.location.hash.slice(1) || '/';

            app.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--muted-text);">Loading...</div>';

            if (hash === '/' || hash === '/curriculum') {
                app.innerHTML = db.home; // db.home is now raw HTML
            } else if (hash.startsWith('/lessons/')) {
                const id = hash.replace('/lessons/', '');
                const lessonHTML = await fetchLessonHTML(id);

                if (lessonHTML) {
                    const navHTML = createNavBlockHTML(id);
                    app.innerHTML = lessonHTML + navHTML;
                } else {
                    app.innerHTML = `
                    <div style="padding: 5rem; text-align: center">
                        <h1 style="color: #e53e3e">404: Lesson HTML not found</h1>
                        <a href="#/">Back to Curriculum</a>
                    </div>`;
                }
            } else {
                app.innerHTML = `
                <div style="padding: 5rem; text-align: center">
                    <h1 style="color: #e53e3e">404: Node not found</h1>
                    <a href="#/">Back to Curriculum</a>
                </div>`;
            }
            window.scrollTo(0, 0);
        };

        window.onhashchange = route;

        // Initialize
        updateUIStrings();
        loadData().then(route);

        // Register Service Worker for Offline access (PWA Core)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
