<h1>Definite and Indefinite Articles</h1>
<p>Spanish articles must agree in gender and number with the nouns they modify.</p>
<h2>Definite Articles (The)</h2>
<table>
<thead>
<tr>
<th>Number</th>
<th>Masculine</th>
<th>Feminine</th>
</tr>
</thead>
<tbody>
<tr>
<td>Singular</td>
<td>el</td>
<td>la</td>
</tr>
<tr>
<td>Plural</td>
<td>los</td>
<td>las</td>
</tr>
</tbody>
</table>
<h2>Indefinite Articles (A, An, Some)</h2>
<table>
<thead>
<tr>
<th>Number</th>
<th>Masculine</th>
<th>Feminine</th>
</tr>
</thead>
<tbody>
<tr>
<td>Singular</td>
<td>un</td>
<td>una</td>
</tr>
<tr>
<td>Plural</td>
<td>unos</td>
<td>unas</td>
</tr>
</tbody>
</table>
</div>
