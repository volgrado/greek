<h1>Stem-Changers: e -&gt; i</h1>
<p>A smaller group of -ir verbs change the 'e' in the stem to a simple 'i'.</p>
<h2>Example: Pedir (to ask for/order)</h2>
<table>
<thead>
<tr>
<th>Subject</th>
<th>Conjugation</th>
</tr>
</thead>
<tbody>
<tr>
<td>Yo</td>
<td>p<strong>i</strong>do</td>
</tr>
<tr>
<td>Él / Ella</td>
<td>p<strong>i</strong>de</td>
</tr>
<tr>
<td>Nosotros</td>
<td>pedimos</td>
</tr>
<tr>
<td>Ellos</td>
<td>p<strong>i</strong>den</td>
</tr>
</tbody>
</table>
<ul>
<li><span class="spanish">Repetir → Repito</span> <span class="meaning">((I repeat))</span></li>
<li><span class="spanish">Servir → Sirvo</span> <span class="meaning">((I serve))</span></li>
</ul>
</div>
