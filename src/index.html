<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek</title>
    <!-- Mobile App Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/icon.svg">
    <!-- Fonts: Lora (Editorial), Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">

    <!-- Speculation Rules API for instant navigation -->
    <script type="speculationrules">
    {
      "prerender": [
        {
          "source": "list",
          "urls": [],
          "where": { "href_matches": "*/lessons/*" },
          "eagerness": "moderate"
        }
      ]
    }
    </script>
</head>

<body>
    <header class="root-nav">
        <a href="/" class="logo">
            <svg class="flag-logo" viewBox="0 0 27 18">
                <rect class="flag-bg" width="27" height="18"/>
                <path class="flag-stripes" fill="none" stroke-width="2" d="M5,0V11 M0,5H10 M10,3H27 M10,7H27 M0,11H27 M0,15H27"/>
            </svg>
            <span id="logo-text">GREEK</span>
        </a>
        <div class="header-actions">
            <button id="search-btn" popovertarget="search-drawer" class="btn-base btn-icon-only" title="Search Lessons">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="mode-switch-btn" class="btn-base btn-icon-only" title="Switch Mode">
                <span id="mode-label">G</span>
            </button>
            <button id="theme-toggle" class="btn-base btn-icon-only" title="Change Theme">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <!-- Icon updated by Javascript -->
                </svg>
            </button>
        </div>
        <div class="scroll-progress"></div>
    </header>
    <div id="search-drawer" popover class="search-panel">
        <div class="search-drawer-inner">
            <div class="search-drawer-header">
                <input type="text" id="global-search-input" class="global-search-input" placeholder="Search lessons..."
                    autocomplete="off">
                <button id="close-search" class="close-search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="global-search-results" class="global-search-results"></div>
        </div>
    </div>
    <main id="app"></main>
    <footer id="footer-root">
        <div id="footer-disclaimer">
            <span id="footer-course-name">GREEK LANGUAGE COURSE</span> &middot; A1-C2 MASTERY
        </div>

        <div class="footer-actions">
            <button id="download-toggle" class="footer-action-link">
                <span id="footer-download-label">Download Offline</span>
                <span id="download-status-text" class="status-meta">...</span>
            </button>
            <button id="clear-progress" class="footer-action-link warning">
                <span id="footer-clear-label">Reset Progress</span>
            </button>
        </div>
    </footer>
    <template id="skeleton-template">
        <div class="skeleton-loader">
            <div class="skeleton-meta"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 60%"></div>
        </div>
    </template>
    <template id="error-template">
        <div class="error-container">
            <h1 class="error-title"></h1>
            <p class="error-message"></p>
            <div class="error-actions">
                <button onclick="location.reload()" class="btn-base error-retry"></button>
                <a href="/" class="btn-base error-back"></a>
            </div>
        </div>
    </template>
    <script type="module" src="/js/main.js?v=999"></script>
</body>

</html>
