<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek</title>
    <!-- Mobile App Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <!-- Fonts: Lora (Editorial), Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="root-nav">
        <a href="#/" class="logo">
            <svg class="owl-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <rect width="512" height="512" fill="none" rx="64" ry="64" stroke="currentColor" stroke-width="20" />
                <text id="logo-symbol" x="50%" y="62%" dominant-baseline="middle" text-anchor="middle"
                    font-family="var(--font-editorial)" font-weight="bold" font-size="320">Ω</text>
            </svg>
            <span id="logo-text">GREEK</span>
        </a>
        <div class="header-actions">
            <button id="search-btn" class="lang-toggle" title="Search Lessons">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="lang-toggle" class="lang-toggle" title="Change Language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                <span id="lang-label" style="text-transform: uppercase;">EN</span>
            </button>
            <button id="download-toggle" class="download-toggle" title="Download for Offline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
            <button id="theme-toggle" class="theme-toggle" title="Change Theme">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <!-- Icon updated by Javascript -->
                </svg>
            </button>
        </div>
    </header>
    <div id="search-drawer" class="search-panel">
        <div class="search-drawer-inner">
            <div class="search-drawer-header">
                <input type="text" id="global-search-input" class="global-search-input" placeholder="Search lessons..."
                    autocomplete="off">
                <button id="close-search" class="close-search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="global-search-results" class="global-search-results"></div>
        </div>
    </div>
    <main id="app"></main>
    <footer id="footer"></footer>
    <template id="skeleton-template">
        <div class="skeleton-loader">
            <div class="skeleton-meta"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 60%"></div>
        </div>
    </template>
    <template id="error-template">
        <div class="error-container">
            <h1 class="error-title"></h1>
            <p class="error-message"></p>
            <div class="error-actions">
                <button onclick="location.reload()" class="lang-toggle error-retry"></button>
                <a href="#/" class="lang-toggle error-back"></a>
            </div>
        </div>
    </template>
    <script type="module" src="js/main.js"></script>
</body>

</html>
